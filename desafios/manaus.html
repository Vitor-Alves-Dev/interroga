<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="imagex/png" href="../imagens/interrogação.ico">
    <title>Desafio 4</title>
    <style>
        body{
            background-color: black;
        }


#bola {
  width: 100px;
  height: 100px;
  background: blue;
  border-radius: 50%;
  position: absolute;
  cursor: pointer;

  opacity: 0.03; 
  transition: 0.2s;
}
#bola:hover {
  opacity: 1;
}
h1 {
    color:rgba(255, 255, 255, 0.884) ;
    opacity: 0.2;
    text-align: center;
    margin-top: 20%;
}
#mensagem {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  color: white;
  padding: 20px;
  border-radius: 10px;
  font-size: 20px;
}
    </style>
</head>
<body>
    <h1>Quem procura, acha.</h1>
      <p id="mensagem" style="display: none;">
         “Quem tudo quer, tudo ____”
      </p>
  <div id="area">
  <div id="bola"></div>
</div>
</body>
<script>
    
const bola = document.getElementById('bola');
const resposta = document.getElementById('resposta');

const posicoes = [
  { x: 100, y: 100 },
  { x: 300, y: 200 },
  { x: 1500, y: 500},
  { x: 200, y: 400 },
  { x: 1750, y: 100 }
];

let etapa = 0;

// posiciona a bolinha
function irParaPosicao() {
  bola.style.left = posicoes[etapa].x + 'px';
  bola.style.top = posicoes[etapa].y + 'px';
}

// 👇 MOSTRA A PRIMEIRA VEZ
irParaPosicao();
bola.style.display = 'block';

// clique
bola.addEventListener('click', () => {
  etapa++;

  const mensagem = document.getElementById('mensagem');

    if (etapa === posicoes.length) {
        bola.style.opacity = '0';
        mensagem.style.display = 'block';
    } else {
        bola.style.display = 'none';

    setTimeout(() => {
      irParaPosicao();
      bola.style.display = 'block'; // 👈 reaparece já na nova posição
    }, 300);
  }
});

 
</script>
</html>
