<!DOCTYPE html>
<html lang="en">
<head>

</head>
<style>
    body {
        background-color: black;

    }
    h1{
        color: white;

    input {

        text-align: center;

    }

    }
    button {
        width: 150px;
        height: 50px;
        background-color: rgb(83, 3, 3);
        color: white;
        cursor: pointer;
        margin: 0 auto;
        display: flex;
        border: 2px solid rgb(178, 107, 107);
        border-radius: 13px;

        justify-content: center;

        font-weight: bold;

    button:hover{
        background-color: rgb(182, 18, 18);

        color: red;
    }
    a {
        text-decoration: none;
        
    }

    .nome {

    }

    .botao2 {
        width: 150px;

        border: 2px solid rgb(178, 107, 107);

    }
    
</style>
<body>
    
<div id="conteudo">

  <input type="text" id="inputNome" />
  <button onclick="iniciar()">→</button>
</div>

<script>
  function iniciar() {
  let nome = document.getElementById("inputNome").value

  if (!nome) nome = alert('Digite algum nome!')

  document.getElementById("conteudo").innerHTML = `
    <h1>
      Seja bem vindo(a) ao Interroga,

      Primeiro, vamos às instruções!

      Ao total serão <strong class="vermelho">10</strong> fases,
      cada fase terá um enigma a ser decifrado, e a resposta será apenas uma palavra!

      <br><br>

      Quando descobrir a palavra certa basta colocá-la na URL do site.
      Vamos a um exemplo?
      <br><br><br>

      <a href="exemplo.html">
        <button class='botao2'>VAMOS LÁ!</button>
      </a>
    </h1>
  `
}

  const conteudo = document.getElementById('conteudo')

  
  
</script>
